services:
  mysql:
    image: mysql:8.0
    container_name: portfolio-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: webpersonal_portofolio
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: portfolio
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: webpersonal_portofolio
      DB_USERNAME: portfolio
      DB_PASSWORD: portfolio
    volumes:
      - backend_storage:/var/www/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_HOST: backend:8000
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_storage:
